            { id: "12c", text: "תיעוד מה עבד / מה לא — Playbook לעתיד", detail: "לתעד את כל הלמידה:\n\n• איזה סוג מודעה עבד הכי טוב?\n• מה המסר שהמיר הכי הרבה?\n• מה ה-targeting שעבד?\n• מה ה-show rate הסופי ואיך הגענו אליו?\n• מה ה-Sales script שעבד?\n• טעויות שעשינו ולקחים\n\nהמסמך הזה שווה זהב — כשפותחים סניף חדש, יש Playbook מוכן.", assignee: "david", done: false, notes: "", priority: "high" },
          ]
        }
      ]
    }
  ],
  weeklyNotes: []
};

const priorityStyles = {
  critical: { bg: "#FDE8E8", text: "#C0392B", label: "קריטי" },
  high: { bg: "#FFF3E0", text: "#E67E22", label: "גבוה" },
  normal: { bg: "#E8F5E9", text: "#27AE60", label: "רגיל" },
};

function StrategyTracker() {
  const [data, setData] = React.useState(null);
  const [loading, setLoading] = React.useState(true);
  const [activePhase, setActivePhase] = React.useState("phase1");
  const [filter, setFilter] = React.useState("all");
  const [editingNote, setEditingNote] = React.useState(null);
  const [noteText, setNoteText] = React.useState("");
  const [showWeeklyModal, setShowWeeklyModal] = React.useState(false);
  const [weeklyInput, setWeeklyInput] = React.useState("");
  const [expandedCats, setExpandedCats] = React.useState({});
  const [expandedTasks, setExpandedTasks] = React.useState({});

  React.useEffect(() => { loadData(); }, []);

  const loadData = async () => {
    try {
      const res = await fetch("/api/data");
      const result = await res.json();
      if (result && result.phases) { setData(result); }
      else { setData(initialData); await fetch("/api/data", { method: "POST", headers: {"Content-Type":"application/json"}, body: JSON.stringify(initialData) }); }
    } catch { setData(initialData); }
    setLoading(false);
  };

  const saveData = async (newData) => {
    setData(newData);
    try { await fetch("/api/data", { method: "POST", headers: {"Content-Type":"application/json"}, body: JSON.stringify(newData) }); } catch (e) { console.error(e); }
  };

  const toggleTask = (phaseId, catIdx, taskId) => {
    const newData = JSON.parse(JSON.stringify(data));
    const phase = newData.phases.find(p => p.id === phaseId);
    const task = phase.categories[catIdx].tasks.find(t => t.id === taskId);
    task.done = !task.done;
    if (task.done) task.completedDate = new Date().toLocaleDateString("he-IL");
    else delete task.completedDate;
    saveData(newData);
  };

  const saveNote = (phaseId, catIdx, taskId) => {
    const newData = JSON.parse(JSON.stringify(data));
    const phase = newData.phases.find(p => p.id === phaseId);
    const task = phase.categories[catIdx].tasks.find(t => t.id === taskId);
    task.notes = noteText;
    saveData(newData);
    setEditingNote(null); setNoteText("");
  };

  const addWeeklyNote = () => {
    if (!weeklyInput.trim()) return;
    const newData = JSON.parse(JSON.stringify(data));
    newData.weeklyNotes.unshift({ date: new Date().toLocaleDateString("he-IL"), text: weeklyInput.trim() });
    saveData(newData);
    setWeeklyInput(""); setShowWeeklyModal(false);
  };

  const resetAll = async () => {
    if (confirm("לאפס את כל הנתונים? פעולה זו בלתי הפיכה.")) {
      await saveData(initialData);
      setActivePhase("phase1");
      setExpandedTasks({});
    }
  };

  const toggleCat = (key) => setExpandedCats(prev => ({ ...prev, [key]: !prev[key] }));
  const toggleExpand = (id) => setExpandedTasks(prev => ({ ...prev, [id]: !prev[id] }));

  const moveTask = (phaseId, catIdx, taskId, direction) => {
    const newData = JSON.parse(JSON.stringify(data));
    const phase = newData.phases.find(p => p.id === phaseId);
    const tasks = phase.categories[catIdx].tasks;
    const idx = tasks.findIndex(t => t.id === taskId);
    if (direction === "up" && idx > 0) {
      [tasks[idx - 1], tasks[idx]] = [tasks[idx], tasks[idx - 1]];
    } else if (direction === "down" && idx < tasks.length - 1) {
      [tasks[idx], tasks[idx + 1]] = [tasks[idx + 1], tasks[idx]];
    } else { return; }
    saveData(newData);
  };

  const moveCat = (phaseId, catIdx, direction) => {
    const newData = JSON.parse(JSON.stringify(data));
    const phase = newData.phases.find(p => p.id === phaseId);
    const cats = phase.categories;
    if (direction === "up" && catIdx > 0) {
      [cats[catIdx - 1], cats[catIdx]] = [cats[catIdx], cats[catIdx - 1]];
    } else if (direction === "down" && catIdx < cats.length - 1) {
      [cats[catIdx], cats[catIdx + 1]] = [cats[catIdx + 1], cats[catIdx]];
    } else { return; }
    saveData(newData);
  };

  const filterTasks = (tasks) => {
    if (filter === "all") return tasks;
    if (filter === "todo") return tasks.filter(t => !t.done);
    if (filter === "done") return tasks.filter(t => t.done);
    if (filter === "david") return tasks.filter(t => t.assignee === "david");
    if (filter === "owner") return tasks.filter(t => t.assignee === "owner");
    if (filter === "critical") return tasks.filter(t => t.priority === "critical");
    return tasks;
  };

  if (loading) return (
    <div style={{ display: "flex", justifyContent: "center", alignItems: "center", height: "100vh", background: "#F8FAFC", direction: "rtl" }}>
      <div style={{ textAlign: "center" }}><div style={{ fontSize: 32, marginBottom: 12 }}>✨</div><div style={{ color: "#64748B", fontSize: 14 }}>טוען אסטרטגיה...</div></div>
    </div>
  );
  if (!data) return null;

  const phase = data.phases.find(p => p.id === activePhase);
  const allTasks = phase.categories.flatMap(c => c.tasks);
  const doneTasks = allTasks.filter(t => t.done);
  const progress = allTasks.length ? Math.round((doneTasks.length / allTasks.length) * 100) : 0;
  const totalAll = data.phases.flatMap(p => p.categories.flatMap(c => c.tasks));
  const totalDone = totalAll.filter(t => t.done);
  const totalProgress = totalAll.length ? Math.round((totalDone.length / totalAll.length) * 100) : 0;

  return (
    <div style={{ fontFamily: "-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif", background: "#F8FAFC", minHeight: "100vh", direction: "rtl" }}>
      {/* Header */}
      <div style={{ background: "linear-gradient(135deg, #1B2A4A 0%, #2E75B6 100%)", padding: "24px 20px 20px", color: "white" }}>
        <div style={{ maxWidth: 800, margin: "0 auto" }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 16 }}>
            <div>
              <h1 style={{ margin: 0, fontSize: 20, fontWeight: 700 }}>Willow Glow</h1>
              <div style={{ fontSize: 13, opacity: 0.8, marginTop: 2 }}>אסטרטגיית שיווק 30-60-90 יום</div>
              <div style={{ fontSize: 10, opacity: 0.6, marginTop: 4, background: "rgba(255,255,255,0.15)", display: "inline-block", padding: "2px 10px", borderRadius: 10 }}>🔗 מסמך משותף — כל שינוי נשמר ונראה לכל המשתתפים</div>
            </div>
            <div style={{ textAlign: "left" }}>
              <div style={{ fontSize: 28, fontWeight: 800 }}>{totalProgress}%</div>
              <div style={{ fontSize: 11, opacity: 0.7 }}>{totalDone.length}/{totalAll.length} משימות</div>
            </div>
          </div>
          <div style={{ background: "rgba(255,255,255,0.15)", borderRadius: 8, height: 6, overflow: "hidden" }}>
            <div style={{ background: "white", height: "100%", width: `${totalProgress}%`, borderRadius: 8, transition: "width 0.5s ease" }} />
          </div>
        </div>
      </div>

      {/* Phase Tabs */}
      <div style={{ maxWidth: 800, margin: "0 auto", padding: "12px 20px 0" }}>
        <div style={{ display: "flex", gap: 6, marginBottom: 12 }}>
          {data.phases.map(p => {
            const pt = p.categories.flatMap(c => c.tasks);
            const pd = pt.filter(t => t.done).length;
            const pp = pt.length ? Math.round((pd / pt.length) * 100) : 0;
            const isA = p.id === activePhase;
            return (
              <button key={p.id} onClick={() => setActivePhase(p.id)} style={{
                flex: 1, padding: "10px 6px", border: isA ? `2px solid ${p.color}` : "2px solid #E2E8F0",
                borderRadius: 10, background: isA ? `${p.color}10` : "white", cursor: "pointer", transition: "all 0.2s"
              }}>
                <div style={{ fontSize: 11, fontWeight: 700, color: p.color }}>{p.title.split("—")[0].trim()}</div>
                <div style={{ fontSize: 10, color: "#64748B", marginTop: 2 }}>{pd}/{pt.length} בוצע</div>
                <div style={{ background: "#E2E8F0", borderRadius: 4, height: 3, marginTop: 4, overflow: "hidden" }}>
                  <div style={{ background: p.color, height: "100%", width: `${pp}%`, borderRadius: 4 }} />
                </div>
              </button>
            );
          })}
        </div>

        {/* Phase Header */}
        <div style={{ background: "white", borderRadius: 12, padding: "16px 18px", marginBottom: 10, boxShadow: "0 1px 3px rgba(0,0,0,0.06)" }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
            <div>
              <h2 style={{ margin: 0, fontSize: 17, color: "#1B2A4A" }}>{phase.title}</h2>
              <div style={{ fontSize: 13, color: phase.color, fontWeight: 600, marginTop: 2 }}>{phase.subtitle}</div>
            </div>
            <div style={{ fontSize: 24, fontWeight: 800, color: phase.color }}>{progress}%</div>
          </div>
        </div>

        {/* Filters */}
        <div style={{ display: "flex", gap: 4, marginBottom: 12, flexWrap: "wrap" }}>
          {[
            { key: "all", label: "הכל" }, { key: "todo", label: "לביצוע" }, { key: "done", label: "בוצע ✓" },
            { key: "critical", label: "🔴 קריטי" }, { key: "david", label: "👤 דויד" }, { key: "owner", label: "🏢 בעלים" }
          ].map(f => (
            <button key={f.key} onClick={() => setFilter(f.key)} style={{
              padding: "5px 12px", borderRadius: 20, border: "1px solid #E2E8F0", fontSize: 11, fontWeight: 500,
              background: filter === f.key ? "#1B2A4A" : "white", color: filter === f.key ? "white" : "#64748B",
              cursor: "pointer", transition: "all 0.15s"
            }}>{f.label}</button>
          ))}
        </div>

        {/* Categories & Tasks */}
        {phase.categories.map((cat, catIdx) => {
          const filtered = filterTasks(cat.tasks);
          if (filtered.length === 0) return null;
          const catDone = cat.tasks.filter(t => t.done).length;
          const catKey = `${phase.id}-${catIdx}`;
          const isExp = expandedCats[catKey] !== false;
          return (
            <div key={catIdx} style={{ marginBottom: 10, background: "white", borderRadius: 12, overflow: "hidden", boxShadow: "0 1px 3px rgba(0,0,0,0.06)" }}>
              <div style={{
                padding: "12px 18px", cursor: "pointer", display: "flex", justifyContent: "space-between", alignItems: "center",
                borderBottom: isExp ? "1px solid #F1F5F9" : "none"
              }}>
                <div onClick={() => toggleCat(catKey)} style={{ fontSize: 14, fontWeight: 700, color: "#1B2A4A", flex: 1 }}>{cat.name}</div>
                <div style={{ display: "flex", alignItems: "center", gap: 4 }}>
                  <button onClick={(e) => { e.stopPropagation(); moveCat(phase.id, catIdx, "up"); }} style={{
                    background: "none", border: "1px solid #E2E8F0", borderRadius: 4, cursor: "pointer", padding: "2px 5px",
                    fontSize: 10, color: "#94A3B8", lineHeight: 1
                  }} title="הזז למעלה">▲</button>
                  <button onClick={(e) => { e.stopPropagation(); moveCat(phase.id, catIdx, "down"); }} style={{
                    background: "none", border: "1px solid #E2E8F0", borderRadius: 4, cursor: "pointer", padding: "2px 5px",
                    fontSize: 10, color: "#94A3B8", lineHeight: 1
                  }} title="הזז למטה">▼</button>
                  <span style={{ fontSize: 11, color: "#94A3B8", fontWeight: 500, marginRight: 4, marginLeft: 4 }}>{catDone}/{cat.tasks.length}</span>
                  <span onClick={() => toggleCat(catKey)} style={{ fontSize: 12, color: "#94A3B8", transform: isExp ? "rotate(180deg)" : "none", transition: "transform 0.2s", cursor: "pointer" }}>▼</span>
                </div>
              </div>
              {isExp && filtered.map(task => {
                const ps = priorityStyles[task.priority];
                const isEditing = editingNote === task.id;
                const isTaskExp = expandedTasks[task.id];
                return (
                  <div key={task.id} style={{ borderBottom: "1px solid #F8FAFC", background: task.done ? "#FAFFFE" : "white" }}>
                    <div style={{ padding: "10px 18px" }}>
                      <div style={{ display: "flex", alignItems: "flex-start", gap: 10 }}>
                        <div style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 0, flexShrink: 0, marginTop: 1 }}>
                          <div onClick={() => toggleTask(phase.id, catIdx, task.id)} style={{
                            width: 22, height: 22, borderRadius: 6, border: task.done ? "2px solid #27AE60" : "2px solid #CBD5E1",
                            background: task.done ? "#27AE60" : "white", cursor: "pointer",
                            display: "flex", alignItems: "center", justifyContent: "center", transition: "all 0.2s"
                          }}>
                            {task.done && <span style={{ color: "white", fontSize: 13, fontWeight: 700 }}>✓</span>}
                          </div>
                          <div style={{ display: "flex", gap: 1, marginTop: 4 }}>
                            <button onClick={() => moveTask(phase.id, catIdx, task.id, "up")} style={{
                              background: "none", border: "1px solid #E2E8F0", borderRadius: 3, cursor: "pointer",
                              padding: "0px 3px", fontSize: 8, color: "#CBD5E1", lineHeight: "14px"
                            }} title="הזז למעלה">▲</button>
                            <button onClick={() => moveTask(phase.id, catIdx, task.id, "down")} style={{
                              background: "none", border: "1px solid #E2E8F0", borderRadius: 3, cursor: "pointer",
                              padding: "0px 3px", fontSize: 8, color: "#CBD5E1", lineHeight: "14px"
                            }} title="הזז למטה">▼</button>
                          </div>
                        </div>
                        <div style={{ flex: 1, minWidth: 0 }}>
                          <div onClick={() => toggleExpand(task.id)} style={{
                            fontSize: 13, color: task.done ? "#94A3B8" : "#1E293B",
                            textDecoration: task.done ? "line-through" : "none", lineHeight: 1.5, cursor: "pointer",
                            display: "flex", justifyContent: "space-between", alignItems: "center"
                          }}>
                            <span>{task.text}</span>
                            <span style={{ fontSize: 10, color: "#CBD5E1", marginRight: 8, flexShrink: 0, transform: isTaskExp ? "rotate(180deg)" : "none", transition: "transform 0.2s" }}>▾</span>
                          </div>
                          <div style={{ display: "flex", gap: 6, marginTop: 5, alignItems: "center", flexWrap: "wrap" }}>
                            <span style={{ fontSize: 10, padding: "1px 8px", borderRadius: 10, fontWeight: 600, background: ps.bg, color: ps.text }}>{ps.label}</span>
                            <span style={{
                              fontSize: 10, padding: "1px 8px", borderRadius: 10, fontWeight: 500,
                              background: task.assignee === "david" ? "#EBF5FF" : "#FFF7ED",
                              color: task.assignee === "david" ? "#2E75B6" : "#C2410C"
                            }}>{task.assignee === "david" ? "דויד" : "בעלים"}</span>
                            {task.completedDate && <span style={{ fontSize: 10, color: "#94A3B8" }}>✓ {task.completedDate}</span>}
                            <button onClick={() => { setEditingNote(isEditing ? null : task.id); setNoteText(task.notes || ""); }} style={{
                              fontSize: 10, color: "#94A3B8", background: "none", border: "none", cursor: "pointer", padding: 0
                            }}>{task.notes ? "📝 ערוך הערה" : "+ הערה"}</button>
                          </div>

                          {/* Expanded detail */}
                          {isTaskExp && (
                            <div style={{
                              marginTop: 8, padding: "12px 14px", background: "#F8FAFC", borderRadius: 8,
                              borderRight: `3px solid ${phase.color}`, fontSize: 12.5, color: "#334155", lineHeight: 1.8, whiteSpace: "pre-wrap"
                            }}>
                              {task.detail}
                            </div>
                          )}

                          {task.notes && !isEditing && !isTaskExp && (
                            <div style={{ fontSize: 11, color: "#64748B", background: "#FFFBEB", padding: "5px 10px", borderRadius: 6, marginTop: 5, borderRight: "3px solid #F59E0B" }}>
                              {task.notes}
                            </div>
                          )}
                          {task.notes && isTaskExp && (
                            <div style={{ fontSize: 11, color: "#64748B", background: "#FFFBEB", padding: "5px 10px", borderRadius: 6, marginTop: 5, borderRight: "3px solid #F59E0B" }}>
                              הערה: {task.notes}
                            </div>
                          )}
                          {isEditing && (
                            <div style={{ marginTop: 6, display: "flex", gap: 6 }}>
                              <input value={noteText} onChange={e => setNoteText(e.target.value)} placeholder="הוסף הערה..."
                                autoFocus style={{ flex: 1, fontSize: 12, padding: "5px 10px", border: "1px solid #E2E8F0", borderRadius: 6, outline: "none", direction: "rtl" }}
                                onKeyDown={e => e.key === "Enter" && saveNote(phase.id, catIdx, task.id)} />
                              <button onClick={() => saveNote(phase.id, catIdx, task.id)} style={{
                                fontSize: 11, padding: "5px 12px", background: "#2E75B6", color: "white", border: "none", borderRadius: 6, cursor: "pointer"
                              }}>שמור</button>
                            </div>
                          )}
                        </div>
                      </div>
                    </div>
                  </div>
                );
              })}
            </div>
          );
        })}

        {/* Weekly Notes */}
        <div style={{ background: "white", borderRadius: 12, padding: "16px 18px", marginTop: 10, marginBottom: 10, boxShadow: "0 1px 3px rgba(0,0,0,0.06)" }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
            <h3 style={{ margin: 0, fontSize: 14, color: "#1B2A4A" }}>📋 סיכומי פגישות שבועיות</h3>
            <button onClick={() => setShowWeeklyModal(!showWeeklyModal)} style={{
              fontSize: 11, padding: "4px 14px", background: "#1B2A4A", color: "white", border: "none", borderRadius: 8, cursor: "pointer"
            }}>+ הוסף סיכום</button>
          </div>
          {showWeeklyModal && (
            <div style={{ marginBottom: 10 }}>
              <textarea value={weeklyInput} onChange={e => setWeeklyInput(e.target.value)}
                placeholder="סיכום פגישה, החלטות, פעולות נדרשות..."
                style={{ width: "100%", fontSize: 12, padding: 10, border: "1px solid #E2E8F0", borderRadius: 8, minHeight: 70, outline: "none", resize: "vertical", boxSizing: "border-box", direction: "rtl" }} />
              <button onClick={addWeeklyNote} style={{
                fontSize: 11, padding: "5px 16px", background: "#2E75B6", color: "white", border: "none", borderRadius: 6, cursor: "pointer", marginTop: 6
              }}>שמור סיכום</button>
            </div>
          )}
          {data.weeklyNotes.length === 0 && !showWeeklyModal && (
            <div style={{ fontSize: 12, color: "#94A3B8", textAlign: "center", padding: 10 }}>אין סיכומי פגישות עדיין</div>
          )}
          {data.weeklyNotes.map((note, i) => (
            <div key={i} style={{ padding: "8px 12px", background: "#F8FAFC", borderRadius: 8, marginBottom: 6, borderRight: "3px solid #2E75B6" }}>
              <div style={{ fontSize: 10, color: "#94A3B8", marginBottom: 3, fontWeight: 600 }}>{note.date}</div>
              <div style={{ fontSize: 12, color: "#334155", whiteSpace: "pre-wrap" }}>{note.text}</div>
            </div>
          ))}
        </div>

        {/* KPIs */}
        <div style={{ background: "white", borderRadius: 12, padding: "16px 18px", marginBottom: 10, boxShadow: "0 1px 3px rgba(0,0,0,0.06)" }}>
          <h3 style={{ margin: "0 0 12px 0", fontSize: 14, color: "#1B2A4A" }}>📊 יעדי KPI</h3>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8 }}>
            {[
              { label: "Show Rate", current: "35%", target: "60%", color: "#C0392B" },
              { label: "מחזור חודשי", current: "$200K", target: "$500K", color: "#2E75B6" },
              { label: "המרה לחבילה", current: "30%", target: "40%", color: "#E67E22" },
              { label: "ביקורות גוגל", current: "~50", target: "+60", color: "#27AE60" },
              { label: "לידים SJ", current: "120", target: "150", color: "#8E44AD" },
              { label: "לידים Milpitas", current: "0", target: "80", color: "#16A085" },
            ].map((kpi, i) => (
              <div key={i} style={{ padding: "10px 12px", background: "#F8FAFC", borderRadius: 8, borderRight: `3px solid ${kpi.color}` }}>
                <div style={{ fontSize: 10, color: "#94A3B8", fontWeight: 600 }}>{kpi.label}</div>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginTop: 3 }}>
                  <span style={{ fontSize: 16, fontWeight: 800, color: "#1E293B" }}>{kpi.current}</span>
                  <span style={{ fontSize: 11, color: kpi.color, fontWeight: 600 }}>← {kpi.target}</span>
                </div>
              </div>
            ))}
          </div>
        </div>

        <div style={{ textAlign: "center", padding: "12px 0 24px" }}>
          <div style={{ fontSize: 11, color: "#CBD5E1", marginBottom: 8 }}>Willow Glow × Frequency-Based Marketing</div>
          <button onClick={resetAll} style={{ fontSize: 10, color: "#E2E8F0", background: "none", border: "none", cursor: "pointer" }}>איפוס נתונים</button>
        </div>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(StrategyTracker));
  </script>
</body>
</html>
